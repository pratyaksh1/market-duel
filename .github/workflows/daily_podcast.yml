name: Daily Market Duel Podcast

on:
  schedule:
    - cron: "30 2 * * 1-5" # 2:30 AM UTC = 8:00 AM IST, Mon-Fri
  workflow_dispatch: # Manual trigger

jobs:
  build:
    runs-on: ubuntu-latest

    # Allow workflow to create releases and push to gh-pages
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Market Duel Pipeline
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          NEWS_API_KEY: ${{ secrets.NEWS_API_KEY }}
          GMAIL_SENDER: ${{ secrets.GMAIL_SENDER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          RECIPIENT_EMAIL: ${{ secrets.RECIPIENT_EMAIL }}
          ELEVENLABS_API_KEY: ${{ secrets.ELEVENLABS_API_KEY }}
          ELEVENLABS_HOST_A_VOICE_ID: ${{ secrets.ELEVENLABS_HOST_A_VOICE_ID }}
          ELEVENLABS_HOST_B_VOICE_ID: ${{ secrets.ELEVENLABS_HOST_B_VOICE_ID }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPO: ${{ github.repository }}
        run: python main.py

      - name: Upload Podcast Artifact (backup)
        uses: actions/upload-artifact@v4
        with:
          name: daily-podcast
          path: output/*.mp3
          retention-days: 30
